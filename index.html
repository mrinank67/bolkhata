<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Bahi-Khata PoC</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px;
      }
      button {
        padding: 20px 40px;
        font-size: 20px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        user-select: none;
      }
      button:active {
        background-color: #45a049;
      }
      #status {
        margin-top: 20px;
        font-size: 18px;
        color: #555;
      }
      #result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
        color: #222;
      }
    </style>
  </head>
  <body>
    <h2>🗣️ Voice Inventory (Hindi PoC)</h2>
    <button id="recordBtn">🎤 Speak (Press & Hold)</button>
    <p id="status">Ready...</p>
    <div id="result"></div>

    <script>
      const recordBtn = document.getElementById("recordBtn");
      const status = document.getElementById("status");
      const resultDiv = document.getElementById("result");

      let mediaRecorder;
      let audioChunks = [];

      navigator.mediaDevices
        .getUserMedia({ audio: true })
        .then((stream) => {
          mediaRecorder = new MediaRecorder(stream);

          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              audioChunks.push(event.data);
            }
          };

          mediaRecorder.onstop = async () => {
            status.innerText = "Processing Audio...";
            resultDiv.innerText = "Sending to AI...";

            const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
            audioChunks = [];

            const formData = new FormData();
            formData.append("audio", audioBlob, "recording.webm");

            try {
              const response = await fetch("/process_voice", {
                method: "POST",
                body: formData,
              });

              const data = await response.json();
              if (data.status === "success") {
                status.innerText = `Heard: "${data.raw_text}"`;
                resultDiv.innerText = data.message;
                resultDiv.style.color = "green";
              } else {
                resultDiv.innerText = `❌ ${data.message}`;
                resultDiv.style.color = "red";
              }
            } catch (error) {
              resultDiv.innerText = "⚠️ Error connecting to backend.";
              console.error(error);
            }
          };
        })
        .catch((err) => {
          status.innerText = "Please allow microphone access.";
        });

      recordBtn.addEventListener("mousedown", () => {
        if (mediaRecorder && mediaRecorder.state === "inactive") {
          mediaRecorder.start();
          status.innerText = "🔴 Listening... (Sun raha hoon)";
          resultDiv.innerText = "";
        }
      });

      recordBtn.addEventListener("mouseup", () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
        }
      });

      recordBtn.addEventListener("mouseleave", () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
        }
      });
    </script>
  </body>
</html>
