<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Bahi-Khata</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f4f9;
      }
      h1 {
        color: #333;
        text-align: center;
      }
      button {
        padding: 20px 40px;
        font-size: 20px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

        /* --- MOBILE FIXES --- */
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        touch-action: none;
      }
      /* Make it look like a physical button being pressed */
      button:active {
        transform: scale(0.96);
      }
      #status {
        font-size: 18px;
        color: #555;
        margin-bottom: 20px;
        min-height: 24px;
      }
      #result {
        font-size: 20px;
        font-weight: bold;
        text-align: center;
        max-width: 90%;
        line-height: 1.5;
        white-space: pre-wrap; /* Allows the multi-line receipts from the backend */
      }
    </style>
  </head>
  <body>
    <h1>🗣️ Voice Bahi-Khata</h1>
    <button id="recordBtn">🎙️ Hold to Speak</button>
    <div id="status">Ready.</div>
    <div id="result"></div>

    <script>
      let mediaRecorder;
      let audioChunks = [];
      let activeStream; // We need to track the stream to kill it later

      const recordBtn = document.getElementById("recordBtn");
      const status = document.getElementById("status");
      const resultDiv = document.getElementById("result");

      // --- DESKTOP AND MOBILE EVENT LISTENERS ---
      const startRecording = async (e) => {
        if (e.cancelable) e.preventDefault();

        try {
          // 1. Only turn on the mic when the button is actively pressed
          activeStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          mediaRecorder = new MediaRecorder(activeStream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (event) => {
            audioChunks.push(event.data);
          };

          mediaRecorder.onstop = async () => {
            // 2. CRITICAL FIX: Kill the mic connection completely to remove the Chrome indicator
            activeStream.getTracks().forEach((track) => track.stop());

            status.innerText = "⏳ Processing...";
            const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

            const formData = new FormData();
            formData.append("audio", audioBlob, "recording.webm");

            const isLocal =
              window.location.hostname === "localhost" ||
              window.location.hostname === "127.0.0.1";
            const backendUrl = isLocal
              ? "http://localhost:8000/process_voice"
              : "/process_voice";

            try {
              const response = await fetch(backendUrl, {
                method: "POST",
                body: formData,
              });

              const data = await response.json();

              if (data.status === "success") {
                status.innerText = `Heard: "${data.raw_text}"`;
                resultDiv.innerText = data.message;
                resultDiv.style.color = "green";
              } else {
                status.innerText = "❌ Error";
                resultDiv.innerText = data.message;
                resultDiv.style.color = "red";
              }
            } catch (error) {
              console.error("Error:", error);
              status.innerText = "❌ Connection Failed";
              resultDiv.innerText = "Could not connect to the server.";
              resultDiv.style.color = "red";
            }
          };

          mediaRecorder.start();
          status.innerText = "🔴 Listening... (Sun raha hoon)";
          resultDiv.innerText = "";
          recordBtn.style.backgroundColor = "#ff4444";
        } catch (err) {
          console.error("Microphone access denied:", err);
          status.innerText =
            "❌ Microphone access denied. Please allow permissions.";
        }
      };

      const stopRecording = (e) => {
        if (e.cancelable) e.preventDefault();

        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
          recordBtn.style.backgroundColor = "#4CAF50";
        }
      };

      // Desktop Mouse Events
      recordBtn.addEventListener("mousedown", startRecording);
      recordBtn.addEventListener("mouseup", stopRecording);
      recordBtn.addEventListener("mouseleave", stopRecording);

      // Mobile Touch Events
      recordBtn.addEventListener("touchstart", startRecording, {
        passive: false,
      });
      recordBtn.addEventListener("touchend", stopRecording);
      recordBtn.addEventListener("touchcancel", stopRecording);
    </script>
  </body>
</html>
